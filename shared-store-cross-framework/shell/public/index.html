<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Example using Module Federation sharing a store across react and vue on the same app"
    />
    <title>Module Federation shared store cross framework</title>
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
  <body>
    <div id="root"></div>
  <!-- Module Federation demo analytics -->
  <script>
    (function () {
      var measurementId = "G-DRPXW0EEVT";
      var cidKey = 'mf_examples_ga_cid';
      var cid;
      try {
        cid = window.localStorage && window.localStorage.getItem(cidKey);
        if (!cid) {
          cid = String(Math.floor(Math.random() * 1000000000)) + '.' + String(Date.now());
          window.localStorage && window.localStorage.setItem(cidKey, cid);
        }
      } catch (error) {
        cid = String(Math.floor(Math.random() * 1000000000)) + '.' + String(Date.now());
      }

      var hostname = window.location.hostname;
      var runtimeContext = /^(localhost|127\.|0\.0\.0\.0|::1)$/.test(hostname) ? 'local' : 'hosted';
      var pageLocation = window.location.origin + window.location.pathname;
      var params = new URLSearchParams({
        v: '2',
        tid: measurementId,
        cid: cid,
        en: 'demo_app_view',
        'ep.repository': "module-federation-examples",
        'ep.example': "shared-store-cross-framework",
        'ep.demo_path': "shared-store-cross-framework/shell/public",
        'ep.entrypoint': "shared-store-cross-framework/shell/public/index.html",
        'ep.runtime_context': runtimeContext,
        dl: pageLocation,
        dt: document.title || ('ModuleFederationExamples ' + "shared-store-cross-framework/shell/public")
      });
      new Image().src = 'https://www.google-analytics.com/g/collect?' + params.toString();
    })();
  </script>
  </body>
</html>
