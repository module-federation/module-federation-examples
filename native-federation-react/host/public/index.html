<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>Host</h1>
    <p>Have a look into your JavaScript console ...</p>

    <div id="root"></div>

    <script type="esms-options">
      {
          "shimMode": true
      }
    </script>

    <script src="https://ga.jspm.io/npm:es-module-shims@1.5.17/dist/es-module-shims.js"></script>
    <script type="module-shim" src="index.js"></script>
  <!-- Module Federation demo analytics -->
  <script>
    (function () {
      var measurementId = "G-DRPXW0EEVT";
      var cidKey = 'mf_examples_ga_cid';
      var cid;
      try {
        cid = window.localStorage && window.localStorage.getItem(cidKey);
        if (!cid) {
          cid = String(Math.floor(Math.random() * 1000000000)) + '.' + String(Date.now());
          window.localStorage && window.localStorage.setItem(cidKey, cid);
        }
      } catch (error) {
        cid = String(Math.floor(Math.random() * 1000000000)) + '.' + String(Date.now());
      }

      var hostname = window.location.hostname;
      var runtimeContext = /^(localhost|127\.|0\.0\.0\.0|::1)$/.test(hostname) ? 'local' : 'hosted';
      var pageLocation = window.location.origin + window.location.pathname;
      var params = new URLSearchParams({
        v: '2',
        tid: measurementId,
        cid: cid,
        en: 'demo_app_view',
        'ep.repository': "module-federation-examples",
        'ep.example': "native-federation-react",
        'ep.demo_path': "native-federation-react/host/public",
        'ep.entrypoint': "native-federation-react/host/public/index.html",
        'ep.runtime_context': runtimeContext,
        dl: pageLocation,
        dt: document.title || ('ModuleFederationExamples ' + "native-federation-react/host/public")
      });
      new Image().src = 'https://www.google-analytics.com/g/collect?' + params.toString();
    })();
  </script>
  </body>
</html>
